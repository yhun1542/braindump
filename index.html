<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRAIN DUMP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f4f4f0;
  --surface:      #ffffff;
  --hdr-bg:       #111111;
  --hdr-text:     #ffffff;
  --border:       #111111;
  --border-mid:   #cccccc;
  --border-light: #e8e8e4;
  --text:         #111111;
  --text2:        #555555;
  --text3:        #aaaaaa;
  --line:         #e4e4e0;
  --row-hover:    #f9f9f6;
  --done-color:   #bbbbbb;
  --shadow:       0 2px 16px rgba(0,0,0,0.07);
  --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}

[data-theme="dark"] {
  --bg:           #161616;
  --surface:      #1e1e1e;
  --hdr-bg:       #f0f0ec;
  --hdr-text:     #111111;
  --border:       #f0f0ec;
  --border-mid:   #333333;
  --border-light: #2a2a2a;
  --text:         #f0f0ec;
  --text2:        #999999;
  --text3:        #555555;
  --line:         #282828;
  --row-hover:    #242424;
  --done-color:   #444444;
  --shadow:       0 2px 16px rgba(0,0,0,0.4);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  transition: background 0.2s, color 0.2s;
}

/* ── LAYOUT ── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 0;
}

.topbar-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text3);
}

.topbar-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--border-mid);
  background: var(--surface);
  color: var(--text2);
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: var(--hdr-bg); color: var(--hdr-text); border-color: var(--hdr-bg); }
.icon-btn:active { transform: scale(0.92); }

/* ── PAGE TITLE ── */
.page-title {
  text-align: center;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 22px 0 6px;
}

/* ── DATE NAV ── */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 0 28px;
}

.date-nav-btn {
  width: 48px;
  height: 56px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  font-size: 24px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.date-nav-btn:hover { color: var(--text); background: var(--line); }
.date-nav-btn:active { transform: scale(0.88); }

.date-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  min-width: 240px;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 12px;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.date-center:hover { background: var(--line); }

.date-main {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1;
}

.date-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
}

.today-pill {
  background: var(--hdr-bg);
  color: var(--hdr-text);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.12em;
  padding: 2px 8px;
  border-radius: 20px;
}

/* ── DATE POPUP ── */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.popup-overlay.hidden { display: none; }

.popup-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 320px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.22);
}

.popup-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 16px;
}

.popup-box input[type="date"] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border-mid);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  margin-bottom: 14px;
  cursor: pointer;
}
.popup-box input[type="date"]:focus { border-color: var(--border); }

.popup-btns {
  display: flex;
  gap: 8px;
}

.btn-dark {
  flex: 1;
  padding: 11px;
  background: var(--hdr-bg);
  color: var(--hdr-text);
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-dark:hover { opacity: 0.82; }

.btn-ghost {
  flex: 1;
  padding: 11px;
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border-mid);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-ghost:hover { border-color: var(--border); color: var(--text); }

/* ── MAIN GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

.col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* ── CARD HEADER ── */
.card-hdr {
  background: var(--hdr-bg);
  color: var(--hdr-text);
  padding: 13px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.card-hdr-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-hdr-icon {
  font-size: 15px;
  line-height: 1;
}

.card-hdr-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.card-hdr-count {
  font-size: 10px;
  font-weight: 700;
  opacity: 0.55;
  letter-spacing: 0.05em;
}

/* ── PROGRESS BAR ── */
.card-prog {
  height: 3px;
  background: var(--border-mid);
}
[data-theme="dark"] .card-prog { background: #2a2a2a; }

.card-prog-fill {
  height: 100%;
  background: var(--hdr-text);
  opacity: 0.45;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] .card-prog-fill { background: var(--hdr-bg); }

/* ── LIST ROWS ── */
.list-body {
  /* no extra padding */
}

.list-row {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--line);
  min-height: 44px;
  transition: background 0.1s;
  position: relative;
}
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--row-hover); }

/* 번호 셀 */
.row-num {
  width: 36px;
  flex-shrink: 0;
  border-right: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.02em;
}

/* 체크박스 셀 */
.row-chk {
  width: 36px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.row-chk input[type="checkbox"] {
  width: 14px;
  height: 14px;
  cursor: pointer;
  accent-color: var(--text);
  border-radius: 2px;
}

/* 텍스트 셀 */
.row-txt {
  flex: 1;
  padding: 10px 8px 10px 6px;
  font-size: 13.5px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.45;
  word-break: break-word;
  min-width: 0;
  cursor: text;
  outline: none;
  background: transparent;
  border: none;
  font-family: var(--font);
  resize: none;
  overflow: hidden;
  align-self: center;
}
.row-txt:empty::before {
  content: attr(data-ph);
  color: var(--text3);
  pointer-events: none;
  font-style: italic;
  font-size: 12px;
}
.row-txt:focus { background: rgba(0,0,0,0.015); }
[data-theme="dark"] .row-txt:focus { background: rgba(255,255,255,0.02); }

.row-txt.done {
  text-decoration: line-through;
  color: var(--done-color);
  text-decoration-color: var(--done-color);
}

/* 삭제 버튼 */
.row-del {
  width: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.list-row:hover .row-del { opacity: 1; }
.row-del:hover { color: #cc2222; }

/* ── EMPTY STATE ── */
.empty-row {
  padding: 20px 18px;
  text-align: center;
  font-size: 12px;
  font-style: italic;
  color: var(--text3);
  border-bottom: 1px solid var(--line);
}

/* ── ADD ROW ── */
.add-row {
  display: flex;
  align-items: stretch;
  border-top: 1.5px solid var(--border);
  min-height: 42px;
  background: var(--bg);
  cursor: text;
  transition: background 0.1s;
}
.add-row:hover { background: var(--line); }

.add-row-icon {
  width: 36px;
  flex-shrink: 0;
  border-right: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text3);
  font-weight: 300;
}

.add-row-input {
  flex: 1;
  padding: 10px 10px;
  font-size: 13px;
  font-family: var(--font);
  background: transparent;
  border: none;
  outline: none;
  color: var(--text2);
  font-style: italic;
}
.add-row-input::placeholder { color: var(--text3); }

.add-row-btn {
  width: 36px;
  flex-shrink: 0;
  border: none;
  background: var(--hdr-bg);
  color: var(--hdr-text);
  font-size: 20px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.add-row-btn:hover { opacity: 0.75; }
.add-row-btn:active { transform: scale(0.9); }

/* ── TOAST ── */
.toast-wrap {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--hdr-bg);
  color: var(--hdr-text);
  padding: 9px 22px;
  border-radius: 24px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  animation: toastIn 0.22s ease, toastOut 0.28s ease 1.72s forwards;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px) scale(0.94); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to   { opacity: 0; transform: translateY(-6px) scale(0.96); }
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 28px 0 0;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── MOBILE ── */
@media (max-width: 660px) {
  .app { padding: 0 12px 28px; }
  .grid { grid-template-columns: 1fr; gap: 14px; }
  .date-main { font-size: 28px; }
  .date-center { min-width: 180px; }
  .row-del { opacity: 1; }
  .row-txt { font-size: 15px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-brand">Brain Dump</span>
    <div class="topbar-actions">
      <button class="icon-btn" id="btnToday" title="오늘 (T)">📅</button>
      <button class="icon-btn" id="btnTheme" title="테마 전환 (D)">🌙</button>
    </div>
  </div>

  <!-- PAGE TITLE -->
  <div class="page-title">Daily Brain Dump</div>

  <!-- DATE NAVIGATION -->
  <div class="date-nav">
    <button class="date-nav-btn" id="btnPrev" title="이전 날짜 (←)">‹</button>
    <div class="date-center" id="dateCenter">
      <div class="date-main" id="dateMain">—</div>
      <div class="date-meta" id="dateMeta">—</div>
    </div>
    <button class="date-nav-btn" id="btnNext" title="다음 날짜 (→)">›</button>
  </div>

  <!-- DATE PICKER POPUP -->
  <div class="popup-overlay hidden" id="popupOverlay">
    <div class="popup-box">
      <div class="popup-title">날짜 선택</div>
      <input type="date" id="dateInput">
      <div class="popup-btns">
        <button class="btn-dark" id="btnConfirm">이동</button>
        <button class="btn-ghost" id="btnCancel">취소</button>
      </div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">
    <div class="col" id="colLeft"></div>
    <div class="col" id="colRight"></div>
  </div>

  <div class="footer">날짜별 자동 저장 · Brain Dump v2</div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── CARD CONFIG ──
const CARDS = [
  { id: 'work',    title: 'Work',           icon: '💼', col: 'left'  },
  { id: 'people',  title: 'People to Meet', icon: '🤝', col: 'right' },
  { id: 'personal',title: 'Personal',       icon: '🙋', col: 'left'  },
  { id: 'call',    title: 'People to Call', icon: '📞', col: 'right' },
  { id: 'family',  title: 'Family',         icon: '🏠', col: 'left'  },
  { id: 'buy',     title: 'Things to Buy',  icon: '🛒', col: 'right' },
];

// ── STATE ──
let curDate = todayStr();
let db = {};
let isDark = false;

// ── UTILS ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function offsetDate(s, delta) {
  const d = parseDate(s);
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}

function fmtDisplay(s) {
  const d = parseDate(s);
  const DAYS = ['일','월','화','수','목','금','토'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return {
    main: `${d.getMonth()+1}월 ${d.getDate()}일`,
    meta: `${d.getFullYear()} · ${DAYS[d.getDay()]}요일`,
    isToday: s === todayStr()
  };
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

// ── STORAGE ──
function load() {
  try { db = JSON.parse(localStorage.getItem('bd_v2') || '{}'); } catch { db = {}; }
  try { isDark = JSON.parse(localStorage.getItem('bd_theme') || 'false'); } catch { isDark = false; }
}

function save() {
  localStorage.setItem('bd_v2', JSON.stringify(db));
}

function getItems(dateKey, cardId) {
  if (!db[dateKey]) db[dateKey] = {};
  if (!db[dateKey][cardId]) db[dateKey][cardId] = [];
  return db[dateKey][cardId];
}

// ── RENDER DATE ──
function renderDate() {
  const info = fmtDisplay(curDate);
  document.getElementById('dateMain').textContent = info.main;
  const meta = document.getElementById('dateMeta');
  meta.innerHTML = info.meta + (info.isToday ? ' <span class="today-pill">TODAY</span>' : '');
}

// ── RENDER CARDS ──
function renderCards() {
  document.getElementById('colLeft').innerHTML = '';
  document.getElementById('colRight').innerHTML = '';

  CARDS.forEach(cfg => {
    const el = buildCard(cfg);
    document.getElementById(cfg.col === 'left' ? 'colLeft' : 'colRight').appendChild(el);
  });
}

function buildCard(cfg) {
  const items = getItems(curDate, cfg.id);
  const total = items.length;
  const done  = items.filter(i => i.done).length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.card = cfg.id;

  // Header
  card.innerHTML = `
    <div class="card-hdr">
      <div class="card-hdr-left">
        <span class="card-hdr-icon">${cfg.icon}</span>
        <span class="card-hdr-title">${cfg.title}</span>
      </div>
      <span class="card-hdr-count">${done}/${total}</span>
    </div>
    <div class="card-prog">
      <div class="card-prog-fill" style="width:${pct}%"></div>
    </div>
  `;

  // List body
  const body = document.createElement('div');
  body.className = 'list-body';

  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-row';
    empty.textContent = '항목을 추가하세요';
    body.appendChild(empty);
  } else {
    items.forEach((item, idx) => {
      body.appendChild(buildRow(cfg.id, item, idx + 1));
    });
  }

  // Add row
  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.innerHTML = `
    <div class="add-row-icon">+</div>
    <input class="add-row-input" placeholder="새 항목 추가..." data-card="${cfg.id}" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="add-row-btn" data-card="${cfg.id}">+</button>
  `;
  body.appendChild(addRow);

  card.appendChild(body);
  return card;
}

function buildRow(cardId, item, num) {
  const row = document.createElement('div');
  row.className = 'list-row';
  row.dataset.item = item.id;

  // Number
  const numEl = document.createElement('div');
  numEl.className = 'row-num';
  numEl.textContent = num;

  // Checkbox
  const chkWrap = document.createElement('div');
  chkWrap.className = 'row-chk';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = item.done;
  cb.addEventListener('change', () => toggleItem(cardId, item.id));
  chkWrap.appendChild(cb);

  // Text
  const txt = document.createElement('div');
  txt.className = 'row-txt' + (item.done ? ' done' : '');
  txt.contentEditable = 'true';
  txt.textContent = item.text;
  txt.dataset.ph = '내용 입력...';
  txt.spellcheck = false;
  txt.addEventListener('blur', () => {
    const v = txt.textContent.trim();
    if (v !== item.text) { item.text = v || item.text; save(); }
  });
  txt.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); txt.blur(); }
  });

  // Delete
  const del = document.createElement('button');
  del.className = 'row-del';
  del.innerHTML = '&times;';
  del.title = '삭제';
  del.addEventListener('click', () => deleteItem(cardId, item.id));

  row.appendChild(numEl);
  row.appendChild(chkWrap);
  row.appendChild(txt);
  row.appendChild(del);
  return row;
}

// ── ACTIONS ──
function addItem(cardId, text) {
  if (!text.trim()) return;
  getItems(curDate, cardId).push({ id: uid(), text: text.trim(), done: false });
  save();
  renderCards();
  toast('추가됨');
  setTimeout(() => {
    const inp = document.querySelector(`.add-row-input[data-card="${cardId}"]`);
    if (inp) inp.focus();
  }, 40);
}

function toggleItem(cardId, itemId) {
  const item = getItems(curDate, cardId).find(i => i.id === itemId);
  if (!item) return;
  item.done = !item.done;
  save();
  renderCards();
}

function deleteItem(cardId, itemId) {
  const items = getItems(curDate, cardId);
  const idx = items.findIndex(i => i.id === itemId);
  if (idx === -1) return;
  items.splice(idx, 1);
  save();
  renderCards();
  toast('삭제됨');
}

function goDate(s) {
  curDate = s;
  renderDate();
  renderCards();
}

// ── DATE POPUP ──
function openPopup() {
  document.getElementById('dateInput').value = curDate;
  document.getElementById('popupOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('dateInput').focus(), 80);
}
function closePopup() {
  document.getElementById('popupOverlay').classList.add('hidden');
}

// ── THEME ──
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('btnTheme').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('bd_theme', JSON.stringify(isDark));
}

// ── TOAST ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// ── EVENTS ──
function bindEvents() {
  document.getElementById('btnPrev').addEventListener('click', () => goDate(offsetDate(curDate, -1)));
  document.getElementById('btnNext').addEventListener('click', () => goDate(offsetDate(curDate, +1)));
  document.getElementById('dateCenter').addEventListener('click', openPopup);
  document.getElementById('btnToday').addEventListener('click', () => { goDate(todayStr()); toast('오늘로 이동'); });
  document.getElementById('btnTheme').addEventListener('click', () => { isDark = !isDark; applyTheme(); });

  document.getElementById('btnConfirm').addEventListener('click', () => {
    const v = document.getElementById('dateInput').value;
    if (v) { goDate(v); toast('날짜 이동'); }
    closePopup();
  });
  document.getElementById('btnCancel').addEventListener('click', closePopup);
  document.getElementById('popupOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('popupOverlay')) closePopup();
  });

  // Grid delegation
  document.addEventListener('click', e => {
    const addBtn = e.target.closest('.add-row-btn');
    if (addBtn) {
      const cardId = addBtn.dataset.card;
      const inp = document.querySelector(`.add-row-input[data-card="${cardId}"]`);
      if (inp) { addItem(cardId, inp.value); inp.value = ''; }
      return;
    }
    const addRow = e.target.closest('.add-row');
    if (addRow && !e.target.closest('.add-row-btn')) {
      const inp = addRow.querySelector('.add-row-input');
      if (inp) inp.focus();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.target.classList.contains('add-row-input') && e.key === 'Enter') {
      e.preventDefault();
      const cardId = e.target.dataset.card;
      addItem(cardId, e.target.value);
      e.target.value = '';
      return;
    }
    const tag = document.activeElement.tagName;
    const ce = document.activeElement.contentEditable;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || ce === 'true') return;
    if (e.key === 'ArrowLeft')  goDate(offsetDate(curDate, -1));
    if (e.key === 'ArrowRight') goDate(offsetDate(curDate, +1));
    if (e.key === 't' || e.key === 'T') { goDate(todayStr()); toast('오늘로 이동'); }
    if (e.key === 'd' || e.key === 'D') { isDark = !isDark; applyTheme(); }
    if (e.key === 'Escape') closePopup();
  });
}

// ── INIT ──
function init() {
  load();
  applyTheme();
  renderDate();
  renderCards();
  bindEvents();
}

init();
</script>
</body>
</html>
