<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAIN DUMP — PC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   BRAIN DUMP — PC DESKTOP VERSION v3.0
   Firebase + AI Reminder Edition
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f5f5f1;
  --surface:     #ffffff;
  --hdr-bg:      #111111;
  --hdr-text:    #ffffff;
  --border:      #111111;
  --border-mid:  #d0d0cc;
  --line:        #ebebе7;
  --text:        #111111;
  --text2:       #555555;
  --text3:       #aaaaaa;
  --row-hover:   #fafaf7;
  --done-color:  #c0c0c0;
  --shadow:      0 1px 12px rgba(0,0,0,0.06);
  --font:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --pa: #c0392b;
  --pb: #2980b9;
  --pc: #27ae60;
}
[data-theme="dark"] {
  --bg:         #141414;
  --surface:    #1c1c1c;
  --hdr-bg:     #efefeb;
  --hdr-text:   #111111;
  --border:     #efefeb;
  --border-mid: #2e2e2e;
  --line:       #242424;
  --text:       #efefeb;
  --text2:      #888888;
  --text3:      #4a4a4a;
  --row-hover:  #202020;
  --done-color: #3a3a3a;
  --shadow:     0 1px 12px rgba(0,0,0,0.35);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  transition: background .2s, color .2s;
}

/* ── LOGIN SCREEN ── */
.login-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--hdr-bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.login-screen.hidden { display: none; }
.login-box {
  width: 400px;
  display: flex; flex-direction: column; align-items: center;
}
.login-logo {
  font-size: 9px; font-weight: 900; letter-spacing: 0.35em;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  margin-bottom: 48px;
}
.login-title {
  font-size: 28px; font-weight: 900; color: #fff;
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.login-sub {
  font-size: 12px; color: rgba(255,255,255,0.35);
  margin-bottom: 40px; letter-spacing: 0.06em;
}
.login-field { width: 100%; margin-bottom: 12px; }
.login-field input {
  width: 100%; padding: 15px 18px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  color: #fff; font-family: var(--font); font-size: 15px;
  outline: none;
}
.login-field input::placeholder { color: rgba(255,255,255,0.28); }
.login-field input:focus { border-color: rgba(255,255,255,0.38); }
.login-btn {
  width: 100%; padding: 16px;
  background: #fff; color: #111;
  border: none; border-radius: 10px;
  font-family: var(--font); font-size: 13px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; margin-top: 8px;
  transition: opacity .15s;
}
.login-btn:hover { opacity: 0.88; }
.login-err {
  font-size: 12px; color: #ff6b6b;
  margin-top: 12px; min-height: 18px;
}

/* ── LAYOUT ── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 32px 48px;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 0 0;
  gap: 16px;
}
.brand {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text3);
  user-select: none;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.icon-btn {
  height: 34px;
  padding: 0 14px;
  border: 1.5px solid var(--border-mid);
  background: var(--surface);
  color: var(--text2);
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  transition: all .15s;
  white-space: nowrap;
}
.icon-btn:hover { background: var(--hdr-bg); color: var(--hdr-text); border-color: var(--hdr-bg); }
.icon-btn:active { transform: scale(0.96); }
.icon-btn .ico { font-size: 14px; }

/* ── PAGE TITLE ── */
.page-title {
  text-align: center;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 24px 0 8px;
  user-select: none;
}

/* ── DATE NAV ── */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 0 32px;
}
.date-nav-btn {
  width: 52px; height: 64px;
  border: none; background: transparent;
  color: var(--text3);
  cursor: pointer;
  font-size: 28px; font-weight: 200;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  transition: all .15s;
  user-select: none;
}
.date-nav-btn:hover { color: var(--text); background: var(--line); }
.date-nav-btn:active { transform: scale(0.88); }
.date-center {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  min-width: 280px;
  cursor: pointer;
  padding: 12px 24px;
  border-radius: 14px;
  transition: background .15s;
  user-select: none;
}
.date-center:hover { background: var(--line); }
.date-main {
  font-size: 44px;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--text);
  line-height: 1;
}
.date-meta {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text3);
}
.today-pill {
  background: var(--hdr-bg); color: var(--hdr-text);
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.1em;
  padding: 2px 9px; border-radius: 20px;
}

/* ── DATE POPUP ── */
.popup-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.32);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.popup-overlay.hidden { display: none; }
.popup-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  width: 360px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
}
.popup-title {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 18px;
}
.popup-box input[type="date"] {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid var(--border-mid);
  border-radius: 9px;
  font-family: var(--font); font-size: 16px;
  background: var(--bg); color: var(--text);
  outline: none; margin-bottom: 16px; cursor: pointer;
}
.popup-box input[type="date"]:focus { border-color: var(--border); }
.popup-btns { display: flex; gap: 10px; }
.btn-dark {
  flex: 1; padding: 12px;
  background: var(--hdr-bg); color: var(--hdr-text);
  border: none; border-radius: 9px;
  font-family: var(--font); font-size: 12px; font-weight: 800;
  letter-spacing: 0.08em; cursor: pointer; transition: opacity .15s;
}
.btn-dark:hover { opacity: 0.8; }
.btn-ghost {
  flex: 1; padding: 12px;
  background: transparent; color: var(--text2);
  border: 1.5px solid var(--border-mid); border-radius: 9px;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.btn-ghost:hover { border-color: var(--border); color: var(--text); }

/* ── MAIN GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}
.col { display: flex; flex-direction: column; gap: 24px; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* ── CARD HEADER ── */
.card-hdr {
  background: var(--hdr-bg); color: var(--hdr-text);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-hdr-left { display: flex; align-items: center; gap: 10px; }
.card-hdr-icon { font-size: 16px; line-height: 1; }
.card-hdr-title {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.22em; text-transform: uppercase;
}
.card-hdr-count {
  font-size: 10px; font-weight: 700;
  opacity: 0.5; letter-spacing: 0.05em;
}

/* ── PROGRESS BAR ── */
.card-prog { height: 3px; background: #2a2a2a; }
[data-theme="dark"] .card-prog { background: #2a2a2a; }
.card-prog-fill {
  height: 100%; background: #fff; opacity: 0.35;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] .card-prog-fill { background: var(--hdr-bg); opacity: 0.4; }

/* ── LIST ROW ── */
.list-body {}
.list-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--line);
  min-height: 46px;
  position: relative;
  overflow: hidden;
}
.list-row:last-child { border-bottom: none; }

.row-inner {
  display: flex; align-items: stretch;
  width: 100%;
  background: var(--surface);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  position: relative;
  z-index: 1;
}
.list-row:hover .row-inner { background: var(--row-hover); }

.row-actions {
  position: absolute; right: 0; top: 0; bottom: 0;
  display: flex;
  z-index: 0;
}
.row-act-btn {
  width: 72px;
  border: none; cursor: pointer;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  transition: opacity .15s;
}
.row-act-btn:hover { opacity: 0.82; }
.row-act-edit { background: #2563eb; color: #fff; }
.row-act-del  { background: #dc2626; color: #fff; }
.row-act-btn .act-ico { font-size: 16px; }

.row-num {
  width: 40px; flex-shrink: 0;
  border-right: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--text3);
}
.row-chk {
  width: 40px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.row-chk input[type="checkbox"] {
  width: 15px; height: 15px;
  cursor: pointer; accent-color: var(--text);
}
.row-pri {
  width: 58px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid var(--line);
}
.pri-badge {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.04em;
  padding: 2px 7px; border-radius: 4px;
  cursor: pointer;
  border: none; background: transparent;
  font-family: var(--font);
}
.pri-A { color: var(--pa); background: rgba(192,57,43,0.08); }
.pri-B { color: var(--pb); background: rgba(41,128,185,0.08); }
.pri-C { color: var(--pc); background: rgba(39,174,96,0.08); }
.pri-none { color: var(--text3); background: transparent; }

.row-txt {
  flex: 1; padding: 10px 10px 10px 8px;
  font-size: 13.5px; font-weight: 400; color: var(--text);
  line-height: 1.45; word-break: break-word;
  cursor: text; outline: none;
  background: transparent; border: none;
  font-family: var(--font);
}
.row-txt:empty::before {
  content: attr(data-ph);
  color: var(--text3); font-style: italic; font-size: 12px;
  pointer-events: none;
}
.row-txt.done {
  text-decoration: line-through;
  color: var(--done-color);
}
.row-del-btn {
  width: 36px; flex-shrink: 0;
  border: none; background: transparent;
  color: var(--text3); font-size: 18px;
  cursor: pointer; opacity: 0;
  transition: opacity .15s, color .15s;
  display: flex; align-items: center; justify-content: center;
}
.list-row:hover .row-del-btn { opacity: 1; }
.row-del-btn:hover { color: #dc2626; }

/* ── ADD ROW ── */
.add-row {
  display: flex; align-items: stretch;
  border-top: 1.5px solid var(--border);
  min-height: 46px;
  background: var(--bg);
  transition: background .1s;
  overflow: hidden;
}
.add-row:hover { background: var(--line); }
.add-row-plus {
  width: 40px; flex-shrink: 0;
  border-right: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 300; color: var(--text3);
}
.add-row-pri {
  width: 58px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid var(--line);
}
.pri-select {
  width: 44px; height: 24px;
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  background: var(--surface); color: var(--text);
  font-family: var(--font); font-size: 11px; font-weight: 700;
  cursor: pointer; outline: none;
  -webkit-appearance: none; appearance: none;
  text-align: center; text-align-last: center;
  padding: 0;
}
.add-row-input {
  flex: 1; padding: 10px 10px;
  font-size: 13px; font-family: var(--font);
  background: transparent; border: none; outline: none;
  color: var(--text2); font-style: italic;
}
.add-row-input::placeholder { color: var(--text3); }
.add-row-btn {
  width: 46px; flex-shrink: 0;
  border: none; background: var(--hdr-bg); color: var(--hdr-text);
  font-size: 22px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.add-row-btn:hover { opacity: 0.75; }
.add-row-btn:active { transform: scale(0.9); }

/* ── PRIORITY POPUP ── */
.pri-popup {
  position: fixed; z-index: 300;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 8px;
  display: grid; grid-template-columns: repeat(3,1fr); gap: 4px;
  width: 180px;
}
.pri-popup.hidden { display: none; }
.pri-opt {
  padding: 8px 4px; border: none; cursor: pointer;
  border-radius: 6px;
  font-family: var(--font); font-size: 11px; font-weight: 800;
  letter-spacing: 0.04em; text-align: center;
  transition: all .12s;
}
.pri-opt:hover { filter: brightness(1.12); transform: scale(1.06); }
.pri-opt-A1,.pri-opt-A2,.pri-opt-A3 { background: rgba(192,57,43,0.1); color: var(--pa); }
.pri-opt-B1,.pri-opt-B2,.pri-opt-B3 { background: rgba(41,128,185,0.1); color: var(--pb); }
.pri-opt-C1,.pri-opt-C2,.pri-opt-C3 { background: rgba(39,174,96,0.1); color: var(--pc); }

/* ── EDIT MODAL ── */
.edit-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 400;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.edit-overlay.hidden { display: none; }
.edit-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 480px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
}
.edit-title {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text2); margin-bottom: 14px;
}
.edit-pri-row {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.edit-pri-btn {
  padding: 6px 12px; border: 1.5px solid var(--border-mid);
  border-radius: 6px; cursor: pointer;
  font-family: var(--font); font-size: 11px; font-weight: 800;
  background: transparent; color: var(--text2);
  transition: all .12s;
}
.edit-pri-btn.sel-A { border-color: var(--pa); color: var(--pa); background: rgba(192,57,43,0.08); }
.edit-pri-btn.sel-B { border-color: var(--pb); color: var(--pb); background: rgba(41,128,185,0.08); }
.edit-pri-btn.sel-C { border-color: var(--pc); color: var(--pc); background: rgba(39,174,96,0.08); }
.edit-textarea {
  width: 100%; min-height: 80px;
  padding: 12px 14px;
  border: 1.5px solid var(--border-mid); border-radius: 9px;
  font-family: var(--font); font-size: 14px;
  background: var(--bg); color: var(--text);
  outline: none; resize: vertical;
  margin-bottom: 16px; line-height: 1.5;
}
.edit-textarea:focus { border-color: var(--border); }
.edit-btns { display: flex; gap: 10px; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  z-index: 500; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--hdr-bg); color: var(--hdr-text);
  padding: 10px 24px; border-radius: 28px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,0.16);
  animation: tIn .22s ease, tOut .28s ease 1.72s forwards;
}
@keyframes tIn  { from { opacity:0; transform:translateY(10px) scale(.94); } to { opacity:1; transform:none; } }
@keyframes tOut { from { opacity:1; } to { opacity:0; transform:translateY(-6px) scale(.96); } }

/* ── FOOTER ── */
.footer {
  text-align: center; padding: 32px 0 0;
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text3);
}

/* ── VERSION LINKS ── */
.ver-links {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 20px 0 0;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ver-links a {
  color: var(--text3); text-decoration: none;
  padding: 5px 12px; border: 1px solid var(--border-mid);
  border-radius: 20px; transition: all .15s;
}
.ver-links a:hover { color: var(--text); border-color: var(--text); }
.ver-links a.active { background: var(--hdr-bg); color: var(--hdr-text); border-color: var(--hdr-bg); }

/* ── SYNC STATUS ── */
.sync-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--text3);
  padding: 8px 0 0;
  justify-content: center;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #27ae60;
}
.sync-dot.offline { background: #e74c3c; }
.sync-dot.syncing { background: #f39c12; animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── AI REMINDER CARD (full width) ── */
.ai-reminder-wrap {
  grid-column: 1 / -1;
  margin-top: 8px;
}
.ai-reminder-card {
  background: var(--hdr-bg);
  border: 1.5px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.ai-reminder-hdr {
  padding: 16px 24px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
[data-theme="dark"] .ai-reminder-hdr { border-bottom-color: rgba(0,0,0,0.12); }
.ai-reminder-title {
  font-size: 9px; font-weight: 900;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
[data-theme="dark"] .ai-reminder-title { color: rgba(0,0,0,0.35); }
.ai-refresh-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.45);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .3s, opacity .15s;
}
[data-theme="dark"] .ai-refresh-btn { border-color: rgba(0,0,0,0.1); color: rgba(0,0,0,0.35); }
.ai-refresh-btn.spinning { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-refresh-btn:hover { opacity: 0.7; }
.ai-reminder-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}
.ai-reminder-item {
  padding: 20px 24px;
  border-right: 1px solid rgba(255,255,255,0.06);
}
[data-theme="dark"] .ai-reminder-item { border-right-color: rgba(0,0,0,0.1); }
.ai-reminder-item:last-child { border-right: none; }
.ai-reminder-tag {
  font-size: 8px; font-weight: 900; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 8px;

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }

import { getFirestore, doc, setDoc, getDoc, onSnapshot }

const firebaseConfig = {
  apiKey: "AIzaSyAXep5gaNmCz8zhY4oP0Y7k95C1NIK9JvU",
  authDomain: "braindump-jasoneye.firebaseapp.com",
  projectId: "braindump-jasoneye",
  storageBucket: "braindump-jasoneye.firebasestorage.app",
  messagingSenderId: "931666684955",
  appId: "1:931666684955:web:a1d069477abb46e53b5cbe"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db2  = getFirestore(app);

const CARDS = [
  { id:'work',    title:'Work',           icon:'💼', col:'left'  },
  { id:'people',  title:'People to Meet', icon:'🤝', col:'right' },
  { id:'personal',title:'Personal',       icon:'🙋', col:'left'  },
  { id:'call',    title:'People to Call', icon:'📞', col:'right' },
  { id:'family',  title:'Family',         icon:'🏠', col:'left'  },
  { id:'buy',     title:'Things to Buy',  icon:'🛒', col:'right' },
];
const PRI_OPTS = ['A1','A2','A3','B1','B2','B3','C1','C2','C3'];

let curDate   = todayStr();
let db        = {};
let isDark    = false;
let swipedRow = null;
let priTarget = null;
let editTarget= null;
let currentUser = null;
let unsubscribe = null;
let aiCache   = {};
let saveTimer = null;

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }
function parseDate(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function offsetDate(s,delta) {
  const d=parseDate(s); d.setDate(d.getDate()+delta);
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function fmtDisplay(s) {
  const d=parseDate(s);
  const DAYS=['일','월','화','수','목','금','토'];
  return {
    main:`${d.getMonth()+1}월 ${d.getDate()}일`,
    meta:`${d.getFullYear()} · ${DAYS[d.getDay()]}요일`,
    isToday: s===todayStr()
  };
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function priClass(p) {
  if(!p) return 'pri-none';
  if(p[0]==='A') return 'pri-A';
  if(p[0]==='B') return 'pri-B';
  return 'pri-C';
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  dot.className = 'sync-dot' + (state==='ok'?'':state==='syncing'?' syncing':' offline');
  txt.textContent = msg;
}

function getDocRef() {
  if(!currentUser) return null;
  return doc(db2, 'users', currentUser.uid, 'braindump', 'data');
}

async function saveToFirestore() {
  const ref = getDocRef();
  if(!ref) return;
  setSyncStatus('syncing','저장 중...');
  try {
    await setDoc(ref, { data: db, updatedAt: Date.now() });
    setSyncStatus('ok','저장됨 ✓');
  } catch(e) {
    setSyncStatus('offline','저장 실패');
  }
}

function scheduleSave() {
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 800);
}

function subscribeFirestore() {
  if(unsubscribe) unsubscribe();
  const ref = getDocRef();
  if(!ref) return;
  setSyncStatus('syncing','연결 중...');
  unsubscribe = onSnapshot(ref, snap => {
    if(snap.exists()) {
      db = snap.data().data || {};
      renderCards();
      setSyncStatus('ok','실시간 동기화');
    } else {
      db = {};
      setSyncStatus('ok','새 데이터');
    }
  }, err => {
    setSyncStatus('offline','오프라인');
  });
}

function save() {
  localStorage.setItem('bd_pc_v3', JSON.stringify(db));
  scheduleSave();
}

function getItems(dateKey, cardId) {
  if(!db[dateKey]) db[dateKey]={};
  if(!db[dateKey][cardId]) db[dateKey][cardId]=[];
  return db[dateKey][cardId];
}

onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('btnLogout').style.display='flex';
    try { db = JSON.parse(localStorage.getItem('bd_pc_v3')||'{}'); } catch {}
    subscribeFirestore();
    applyTheme(); renderDate(); renderCards();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('btnLogout').style.display='none';
    if(unsubscribe) { unsubscribe(); unsubscribe=null; }
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();

  const err   = document.getElementById('loginErr');

  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    err.textContent = '로그인 실패: 이메일 또는 비밀번호를 확인하세요.';
  }
});

document.getElementById('loginPw').addEventListener('keydown', e => {
  if(e.key==='Enter') document.getElementById('loginBtn').click();
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  await signOut(auth);
  toast('로그아웃됨');
});

function renderDate() {
  const info=fmtDisplay(curDate);
  document.getElementById('dateMain').textContent=info.main;
  const meta=document.getElementById('dateMeta');
  meta.innerHTML=info.meta+(info.isToday?' <span class="today-pill">TODAY</span>':'');
}

function renderCards() {
  document.getElementById('colLeft').innerHTML='';
  document.getElementById('colRight').innerHTML='';

  // Remove old AI card wrap if exists
  const oldWrap = document.getElementById('aiReminderWrap');
  if(oldWrap) oldWrap.remove();

  CARDS.forEach(cfg=>{
    const el=buildCard(cfg);
    document.getElementById(cfg.col==='left'?'colLeft':'colRight').appendChild(el);
  });

  // AI Reminder card (full width below grid)
  const wrap = document.createElement('div');
  wrap.className = 'ai-reminder-wrap';
  wrap.id = 'aiReminderWrap';
  wrap.appendChild(buildAIReminderCard());
  document.getElementById('mainGrid').appendChild(wrap);

  swipedRow=null;
}

function buildCard(cfg) {
  const items=getItems(curDate,cfg.id);
  const total=items.length;
  const done=items.filter(i=>i.done).length;
  const pct=total>0?Math.round((done/total)*100):0;

  const card=document.createElement('div');
  card.className='card';
  card.dataset.card=cfg.id;
  card.innerHTML=`
    <div class="card-hdr">
      <div class="card-hdr-left">
        <span class="card-hdr-icon">${cfg.icon}</span>
        <span class="card-hdr-title">${cfg.title}</span>
      </div>
      <span class="card-hdr-count">${done}/${total}</span>
    </div>
    <div class="card-prog"><div class="card-prog-fill" style="width:${pct}%"></div></div>
  `;

  const body=document.createElement('div');
  body.className='list-body';
  items.forEach((item,idx)=>body.appendChild(buildRow(cfg.id,item,idx+1)));

  const addRow=document.createElement('div');
  addRow.className='add-row';
  addRow.innerHTML=`
    <div class="add-row-plus">+</div>
    <div class="add-row-pri">
      <select class="pri-select" data-card="${cfg.id}">
        <option value="">—</option>
        ${PRI_OPTS.map(p=>`<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <input class="add-row-input" placeholder="새 항목 입력 후 Enter..." data-card="${cfg.id}" autocomplete="off" spellcheck="false">
    <button class="add-row-btn" data-card="${cfg.id}">+</button>
  `;
  body.appendChild(addRow);
  card.appendChild(body);
  return card;
}

function buildRow(cardId,item,num) {
  const row=document.createElement('div');
  row.className='list-row';
  row.dataset.item=item.id;
  row.dataset.card=cardId;

  const actions=document.createElement('div');
  actions.className='row-actions';
  actions.innerHTML=`
    <button class="row-act-btn row-act-edit" data-act="edit"><span class="act-ico">✏️</span>수정</button>
    <button class="row-act-btn row-act-del" data-act="del"><span class="act-ico">🗑</span>삭제</button>
  `;

  const inner=document.createElement('div');
  inner.className='row-inner';

  const numEl=document.createElement('div');
  numEl.className='row-num';
  numEl.textContent=num;

  const chkWrap=document.createElement('div');
  chkWrap.className='row-chk';
  const cb=document.createElement('input');
  cb.type='checkbox'; cb.checked=item.done;
  cb.addEventListener('change',()=>checkItem(cardId,item.id));
  chkWrap.appendChild(cb);

  const priWrap=document.createElement('div');
  priWrap.className='row-pri';
  const priBadge=document.createElement('button');
  priBadge.className=`pri-badge ${priClass(item.priority)}`;
  priBadge.textContent=item.priority||'—';
  priBadge.addEventListener('click',e=>openPriPopup(e,cardId,item.id,priBadge));
  priWrap.appendChild(priBadge);

  const txt=document.createElement('div');
  txt.className='row-txt'+(item.done?' done':'');
  txt.contentEditable='true';
  txt.textContent=item.text;
  txt.dataset.ph='내용 입력...';
  txt.spellcheck=false;
  txt.addEventListener('blur',()=>{
    const v=txt.textContent.trim();
    if(v!==item.text){ item.text=v||item.text; save(); }
  });
  txt.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();txt.blur();} });

  const delBtn=document.createElement('button');
  delBtn.className='row-del-btn';
  delBtn.innerHTML='&times;';
  delBtn.addEventListener('click',()=>deleteItem(cardId,item.id));

  inner.appendChild(numEl);
  inner.appendChild(chkWrap);
  inner.appendChild(priWrap);
  inner.appendChild(txt);
  inner.appendChild(delBtn);
  row.appendChild(actions);
  row.appendChild(inner);
  addSwipe(row,inner,actions,cardId,item);
  return row;
}

function addSwipe(row,inner,actions,cardId,item) {
  const THRESHOLD=80;
  let startX=0, dragging=false, revealed=false;

  function onStart(x) {
    if(swipedRow && swipedRow!==row) closeSwipe(swipedRow);
    startX=x; dragging=true;
    inner.style.transition='none';
  }
  function onMove(x) {
    if(!dragging) return;
    const dx=x-startX;
    if(dx>0 && !revealed) { inner.style.transform='none'; return; }
    const base=revealed?-144:0;
    const offset=Math.max(-144,Math.min(0,base+dx));
    inner.style.transform=`translateX(${offset}px)`;
  }
  function onEnd(x) {
    if(!dragging) return;
    dragging=false;
    const dx=x-startX;
    inner.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
    if(!revealed && dx<-THRESHOLD) {
      inner.style.transform='translateX(-144px)';
      revealed=true; swipedRow=row;
    } else if(revealed && dx>THRESHOLD/2) {
      inner.style.transform='none';
      revealed=false; swipedRow=null;
    } else if(revealed) {
      inner.style.transform='translateX(-144px)';
    } else {
      inner.style.transform='none';
    }
  }

  inner.addEventListener('touchstart',e=>onStart(e.touches[0].clientX),{passive:true});
  inner.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
  inner.addEventListener('touchend',e=>onEnd(e.changedTouches[0].clientX));

  inner.addEventListener('mousedown',e=>{
    if(e.target.closest('input,button,[contenteditable]')) return;
    onStart(e.clientX);
    const mm=ev=>onMove(ev.clientX);
    const mu=ev=>{ onEnd(ev.clientX); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });

  actions.querySelector('[data-act="edit"]').addEventListener('click',()=>{
    closeSwipe(row); openEdit(cardId,item.id);
  });
  actions.querySelector('[data-act="del"]').addEventListener('click',()=>{
    closeSwipe(row); deleteItem(cardId,item.id);
  });

  row._closeSwipe=()=>{ inner.style.transition='transform .25s cubic-bezier(.4,0,.2,1)'; inner.style.transform='none'; revealed=false; };
}

function closeSwipe(row) {
  if(row && row._closeSwipe) row._closeSwipe();
  if(swipedRow===row) swipedRow=null;
}

/* ── AI REMINDER CARD ── */
function buildAIReminderCard() {
  const card = document.createElement('div');
  card.className = 'ai-reminder-card';
  card.id = 'aiReminderCard';
  card.innerHTML = `
    <div class="ai-reminder-hdr">
      <span class="ai-reminder-title">✦ Highlight Reminder of the Day</span>
      <button class="ai-refresh-btn" id="aiRefreshBtn" title="새로고침">↻</button>
    </div>
    <div class="ai-reminder-body" id="aiReminderBody">
      <div class="ai-reminder-loading">AI 분석 중...</div>
    </div>
    <div class="ai-reminder-footer"><span class="ai-reminder-ts" id="aiTs"></span></div>
  `;

  if(aiCache[curDate]) {
    setTimeout(()=>renderAIReminders(aiCache[curDate]), 0);
  } else {
    setTimeout(()=>fetchAIReminders(), 150);
  }

  card.querySelector('#aiRefreshBtn').addEventListener('click', ()=>{
    delete aiCache[curDate];
    fetchAIReminders();
  });
  return card;
}

function renderAIReminders(data) {
  const body = document.getElementById('aiReminderBody');
  const ts   = document.getElementById('aiTs');
  const btn  = document.getElementById('aiRefreshBtn');
  if(!body) return;
  if(btn) btn.classList.remove('spinning');
  if(!data || data.error) {
    body.innerHTML = `<div class="ai-reminder-loading">${data?.error||'리마인더를 불러올 수 없습니다.'}</div>`;
    return;
  }
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  body.innerHTML = `
    <div class="ai-reminder-item">
      <div class="ai-reminder-tag tag-schedule">📅 Schedule Reminder</div>
      <div class="ai-reminder-text">${data.schedule}</div>
    </div>
    <div class="ai-reminder-item">
      <div class="ai-reminder-tag tag-todo">✅ Todo Reminder</div>
      <div class="ai-reminder-text">${data.todo}</div>
    </div>
    <div class="ai-reminder-item">
      <div class="ai-reminder-tag tag-signal">⚡ Signal to Action</div>
      <div class="ai-reminder-text">${data.signal}</div>
    </div>
  `;
  if(ts) ts.textContent = `Updated ${now}`;
}

async function fetchAIReminders() {
  const body = document.getElementById('aiReminderBody');
  const btn  = document.getElementById('aiRefreshBtn');
  if(!body) return;
  if(btn) btn.classList.add('spinning');
  body.innerHTML = '<div class="ai-reminder-loading">AI 분석 중...</div>';

  const allTasks = [];
  CARDS.forEach(cfg => {
    const items = getItems(curDate, cfg.id);
    items.forEach(item => {
      if(!item.done) allTasks.push(`[${cfg.title}] ${item.text}${item.priority?' ('+item.priority+')':''}`);
    });
  });

  const dateInfo = fmtDisplay(curDate);

  // Firestore 캐시 확인
  if(currentUser) {
    try {
      const aiRef = doc(db2, 'users', currentUser.uid, 'ai_reminders', curDate);
      const snap = await getDoc(aiRef);
      if(snap.exists()) {
        const cached = snap.data();
        if(cached.schedule && cached.todo && cached.signal) {
          aiCache[curDate] = cached;
          renderAIReminders(cached);
          return;
        }
      }
    } catch(e) {}
  }

  const fallback = {
    schedule: `${dateInfo.main} 오늘 하루를 시작합니다. 중요한 약속과 데드라인을 확인하고, 하루 계획을 세워보세요. 정기적인 루틴(운동, 독서 등)을 빠뜨리지 않도록 체크하세요.`,
    todo: allTasks.length > 0
      ? `현재 ${allTasks.length}개의 할일이 있습니다. 우선순위 A 항목을 먼저 처리하고, 오늘 안에 완료 가능한 것부터 시작하세요. 작은 성취가 모멘텀을 만듭니다.`
      : `오늘의 할일을 지금 바로 추가해보세요. 머릿속에 있는 것들을 모두 Brain Dump하면 정신적 부담이 줄어듭니다. Work, Personal, Family 카드부터 채워보세요.`,
    signal: `지금 이 순간 가장 중요한 한 가지에 집중하세요. 완벽하지 않아도 시작이 중요합니다. 오늘 하루가 끝나기 전에 반드시 완료해야 할 단 하나의 일을 정하고 바로 행동하세요.`
  };
  aiCache[curDate] = fallback;
  renderAIReminders(fallback);

  if(currentUser) {
    const aiRef = doc(db2, 'users', currentUser.uid, 'ai_reminders', curDate);
    setDoc(aiRef, { ...fallback, generatedAt: Date.now() }).catch(()=>{});
  }
}

function addItem(cardId,text,priority) {
  if(!text.trim()) return;
  getItems(curDate,cardId).push({id:uid(),text:text.trim(),done:false,priority:priority||''});
  save(); renderCards(); toast('추가됨');
  setTimeout(()=>{
    const inp=document.querySelector(`.add-row-input[data-card="${cardId}"]`);
    if(inp) inp.focus();
  },40);
}

function checkItem(cardId,itemId) {
  const items=getItems(curDate,cardId);
  const item=items.find(i=>i.id===itemId);
  if(!item) return;
  item.done=true; save();
  const row=document.querySelector(`.list-row[data-item="${itemId}"]`);
  if(row) {
    row.style.transition='opacity .35s, max-height .35s, padding .35s';
    row.style.opacity='0'; row.style.maxHeight='0'; row.style.overflow='hidden';
    setTimeout(()=>{ items.splice(items.findIndex(i=>i.id===itemId),1); save(); renderCards(); toast('완료 ✓'); },360);
  } else {
    items.splice(items.findIndex(i=>i.id===itemId),1); save(); renderCards(); toast('완료 ✓');
  }
}

function deleteItem(cardId,itemId) {
  const items=getItems(curDate,cardId);
  const idx=items.findIndex(i=>i.id===itemId);
  if(idx===-1) return;
  items.splice(idx,1); save(); renderCards(); toast('삭제됨');
}

function openPriPopup(e,cardId,itemId,anchorEl) {
  e.stopPropagation();
  const popup=document.getElementById('priPopup');
  popup.innerHTML=PRI_OPTS.map(p=>`<button class="pri-opt pri-opt-${p}" data-p="${p}">${p}</button>`).join('');
  popup.classList.remove('hidden');
  priTarget={cardId,itemId,anchorEl};
  const rect=anchorEl.getBoundingClientRect();
  popup.style.top=(rect.bottom+6)+'px';
  popup.style.left=Math.max(4,rect.left-40)+'px';
}
function closePriPopup() {
  document.getElementById('priPopup').classList.add('hidden');
  priTarget=null;
}

function openEdit(cardId,itemId) {
  const item=getItems(curDate,cardId).find(i=>i.id===itemId);
  if(!item) return;
  editTarget={cardId,itemId};
  const priRow=document.getElementById('editPriRow');
  priRow.innerHTML=PRI_OPTS.map(p=>`<button class="edit-pri-btn${item.priority===p?' sel-'+p[0]:''}" data-p="${p}">${p}</button>`).join('');
  document.getElementById('editTextarea').value=item.text;
  document.getElementById('editOverlay').classList.remove('hidden');
  document.getElementById('editTextarea').focus();
}
function closeEdit() {
  document.getElementById('editOverlay').classList.add('hidden');
  editTarget=null;
}

function goDate(s) { curDate=s; renderDate(); renderCards(); }
function openDatePopup() {
  document.getElementById('dateInput').value=curDate;
  document.getElementById('popupOverlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('dateInput').focus(),80);
}
function closeDatePopup() { document.getElementById('popupOverlay').classList.add('hidden'); }

function applyTheme() {
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('themeIco').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('bd_theme',JSON.stringify(isDark));
}

function toast(msg) {
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

function bindEvents() {
  document.getElementById('btnPrev').addEventListener('click',()=>goDate(offsetDate(curDate,-1)));
  document.getElementById('btnNext').addEventListener('click',()=>goDate(offsetDate(curDate,+1)));
  document.getElementById('dateCenter').addEventListener('click',openDatePopup);
  document.getElementById('btnToday').addEventListener('click',()=>{ goDate(todayStr()); toast('오늘로 이동'); });
  document.getElementById('btnTheme').addEventListener('click',()=>{ isDark=!isDark; applyTheme(); });

  document.getElementById('btnConfirm').addEventListener('click',()=>{
    const v=document.getElementById('dateInput').value;
    if(v){ goDate(v); toast('날짜 이동'); }
    closeDatePopup();
  });
  document.getElementById('btnCancel').addEventListener('click',closeDatePopup);
  document.getElementById('popupOverlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('popupOverlay')) closeDatePopup();
  });

  document.getElementById('priPopup').addEventListener('click',e=>{
    const btn=e.target.closest('[data-p]');
    if(!btn||!priTarget) return;
    const p=btn.dataset.p;
    const item=getItems(curDate,priTarget.cardId).find(i=>i.id===priTarget.itemId);
    if(item){ item.priority=p; save(); renderCards(); toast(`우선순위 ${p}`); }
    closePriPopup();
  });

  document.getElementById('editPriRow').addEventListener('click',e=>{
    const btn=e.target.closest('[data-p]');
    if(!btn) return;
    document.querySelectorAll('.edit-pri-btn').forEach(b=>b.className='edit-pri-btn');
    btn.className=`edit-pri-btn sel-${btn.dataset.p[0]}`;
    btn.dataset.selected='true';
  });
  document.getElementById('editSave').addEventListener('click',()=>{
    if(!editTarget) return;
    const item=getItems(curDate,editTarget.cardId).find(i=>i.id===editTarget.itemId);
    if(!item) return;
    item.text=document.getElementById('editTextarea').value.trim()||item.text;
    const selBtn=document.querySelector('.edit-pri-btn[data-selected="true"]');
    if(selBtn) item.priority=selBtn.dataset.p;
    save(); renderCards(); closeEdit(); toast('수정됨');
  });
  document.getElementById('editCancel').addEventListener('click',closeEdit);
  document.getElementById('editOverlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('editOverlay')) closeEdit();
  });

  document.addEventListener('click',e=>{
    if(!e.target.closest('#priPopup')&&!e.target.closest('.pri-badge')) closePriPopup();
    if(!e.target.closest('.list-row')&&swipedRow) closeSwipe(swipedRow);
    const addBtn=e.target.closest('.add-row-btn');
    if(addBtn){
      const cardId=addBtn.dataset.card;
      const inp=document.querySelector(`.add-row-input[data-card="${cardId}"]`);
      const sel=document.querySelector(`.pri-select[data-card="${cardId}"]`);
      if(inp){ addItem(cardId,inp.value,sel?sel.value:''); inp.value=''; if(sel) sel.value=''; }
    }
  });

  document.addEventListener('keydown',e=>{
    if(e.target.classList.contains('add-row-input')&&e.key==='Enter'){
      e.preventDefault();
      const cardId=e.target.dataset.card;
      const sel=document.querySelector(`.pri-select[data-card="${cardId}"]`);
      addItem(cardId,e.target.value,sel?sel.value:'');
      e.target.value=''; if(sel) sel.value='';
      return;
    }
    const tag=document.activeElement.tagName;
    const ce=document.activeElement.contentEditable;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||ce==='true') return;
    if(e.key==='ArrowLeft') goDate(offsetDate(curDate,-1));
    if(e.key==='ArrowRight') goDate(offsetDate(curDate,+1));
    if(e.key==='t'||e.key==='T'){ goDate(todayStr()); toast('오늘로 이동'); }
    if(e.key==='d'||e.key==='D'){ isDark=!isDark; applyTheme(); }
    if(e.key==='Escape'){ closeDatePopup(); closePriPopup(); closeEdit(); }
  });
}

try { isDark=JSON.parse(localStorage.getItem('bd_theme')||'false'); } catch {}
applyTheme();
renderDate();
bindEvents();
</script>
</body>
</html>
